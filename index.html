<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard</title>
    <style>
        :root {
            /* Chaotic Early 90s Geocities Palette */
            --bg-color: #000033; /* Deep space blue */
            --panel-bg: #000080; /* Navy blue panels */
            --text-color: #00FF00; /* Hacker neon green */
            --primary: #FF00FF; /* Hot Magenta */
            --secondary: #FFFF00; /* Pure Yellow */
            --border-wild: 4px ridge #00FFFF; /* Cyan 3D ridge */
            --sleep-color: #00FFFF; /* Cyan */
            --wake-color: #FF00FF; /* Magenta */
        }
        
        body, html {
            margin: 0; padding: 10px; height: 100%; box-sizing: border-box;
            /* Starry background using SVG data URI */
            background-color: var(--bg-color);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5l5 15h15l-12 10 5 15-13-10-13 10 5-15-12-10h15z' fill='%23ffff00' fill-opacity='0.15'/%3E%3C/svg%3E");
            color: var(--text-color);
            font-family: "Comic Sans MS", "Chalkboard SE", cursive, sans-serif;
        }
        
        #dashboard { 
            display: flex; height: calc(100% - 20px); flex-direction: column; 
        }
        
        .page-title {
            text-align: center;
            color: var(--secondary);
            text-shadow: 2px 2px #FF0000;
            margin-top: 0;
            font-size: 2em;
        }

        .tabs {
            display: flex; justify-content: center; padding: 10px; gap: 10px;
            margin-bottom: 10px;
        }
        .tab-btn {
            font-family: "Comic Sans MS", cursive;
            font-size: 1.1em; font-weight: bold;
            padding: 10px 20px; 
            background-color: var(--primary); color: #FFF;
            border: 4px outset var(--primary);
            cursor: url('https://cur.cursors-4u.net/smilies/smi-1/smi26.cur'), pointer; /* Custom 90s cursor fallback */
            border-radius: 15px;
        }
        .tab-btn.active { 
            background-color: var(--secondary); 
            color: #000;
            border: 4px inset var(--secondary);
            text-decoration: blink;
        }
        .tab-btn:hover {
            background-color: #00FFFF;
            color: #000;
            border-color: #00FFFF;
        }

        .tab-content { display: none; flex-grow: 1; height: 100%; overflow-y: auto;}
        .tab-content.active { display: flex; flex-direction: column; }
        
        iframe { 
            width: 100%; height: 100%; 
            border: 8px groove var(--primary);
            background: #fff;
        }

        .tracker-container { padding: 10px; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        
        /* Wild 90s Panels */
        .panel {
            background-color: var(--panel-bg); 
            padding: 15px; 
            margin-bottom: 20px;
            border: var(--border-wild);
            box-shadow: 5px 5px 0px #FF00FF;
        }

        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-controls button { 
            font-family: "Comic Sans MS", cursive; font-weight: bold;
            background-color: var(--text-color); color: #000; 
            border: 3px outset var(--text-color);
            padding: 5px 15px; cursor: pointer; 
        }
        .header-controls button:active { border-style: inset; }
        
        .stats-card { text-align: center; }
        .stats-card h2 { margin: 0 0 10px 0; color: #00FFFF; text-decoration: underline dashed #FF00FF;}
        .stats-card p { font-size: 1.2em; margin: 5px 0; color: var(--secondary); font-weight: bold;}
        
        #current-status { 
            margin-top: 15px; font-weight: bold; font-size: 1.2em;
            padding: 10px; 
            border: 2px dotted #FFFF00;
            background: #000; color: #FFF;
        }
        
        /* TIMELINE STYLES */
        .timeline-container h3 { margin-top: 0; margin-bottom: 10px; text-align: center; color: var(--primary); text-shadow: 1px 1px #FFF;}
        .timeline-wrapper { position: relative; margin-top: 15px; margin-bottom: 15px; }
        
        .dynamic-labels { position: relative; height: 20px; width: 100%; }
        .dynamic-label { 
            position: absolute; transform: translateX(-50%); font-size: 1em; font-weight: bold; bottom: 2px; 
            text-shadow: 2px 2px 0px #000; z-index: 5;
        }
        
        .timeline-bar { 
            position: relative; height: 40px; background-color: #333; 
            border: 3px solid #FFFF00;
            margin: 5px 0; 
            background-image: repeating-linear-gradient(45deg, #000 0, #000 10px, #333 10px, #333 20px);
        }
        .timeline-sleep-block { position: absolute; height: 100%; top: 0; background-color: var(--sleep-color); opacity: 0.9; z-index: 1;}
        .hour-tick { position: absolute; bottom: 0; width: 1px; height: 12px; background-color: #FFF; z-index: 2; }
        
        .fixed-labels { position: relative; height: 20px; width: 100%; font-size: 0.9em; color: #00FFFF; font-weight: bold;}
        .fixed-label { position: absolute; transform: translateX(-50%); }

        .input-group { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; justify-content: center;}
        .input-group div { display: flex; flex-direction: column; }
        .input-group label { margin-bottom: 5px; font-size: 1.1em; text-align: center; color: var(--secondary);}
        
        .input-group input { 
            padding: 5px; background: #000; color: var(--text-color); 
            border: 3px inset #00FFFF;
            font-family: "Courier New", Courier, monospace; font-size: 1.2em; font-weight: bold;
        }
        
        .btn-sleep { 
            padding: 10px 20px; background-color: var(--sleep-color); color: #000; 
            border: 4px outset var(--sleep-color);
            cursor: pointer; font-weight: bold; font-family: "Comic Sans MS", cursive; font-size: 1.1em;
        }
        .btn-wake { 
            padding: 10px 20px; background-color: var(--wake-color); color: #000; 
            border: 4px outset var(--wake-color);
            cursor: pointer; font-weight: bold; font-family: "Comic Sans MS", cursive; font-size: 1.1em;
        }
        .btn-sleep:active, .btn-wake:active { border-style: inset; }

        .log-list h3 { margin-top: 0; color: #00FFFF; text-align: center;}
        .log-item { 
            display: flex; justify-content: space-between; align-items: center; padding: 10px; 
            border-bottom: 2px dashed var(--primary); font-family: "Courier New", Courier, monospace;
            background-color: #000055; margin-bottom: 5px;
        }
        .tag-sleep { color: var(--sleep-color); font-weight: bold; margin-right: 10px; font-size: 1.2em;}
        .tag-wake { color: var(--wake-color); font-weight: bold; margin-right: 10px; font-size: 1.2em;} 
        
        .delete-btn { 
            background: #FF0000; color: #FFFF00; 
            border: 3px outset #FF0000;
            cursor: pointer; padding: 5px 10px; font-weight: bold; font-size: 0.9em;
            font-family: "Comic Sans MS", cursive;
        }
        .delete-btn:active { border-style: inset; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1 class="page-title">~*~ Master Dashboard ~*~</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab1', this)">WiFi Cam!</button>
            <button class="tab-btn" onclick="switchTab('tab2', this)">Away Cam!</button>
            <button class="tab-btn" onclick="switchTab('tab3', this)">Puppy Tracker!</button>
        </div>

        <div id="tab1" class="tab-content active">
            <iframe data-src="http://babycam.local:5000/" src="http://babycam.local:5000/"></iframe>
        </div>

        <div id="tab2" class="tab-content">
            <iframe data-src="https://remover-barbed-expert.ngrok-free.dev/" src=""></iframe>
        </div>

        <div id="tab3" class="tab-content">
            <div class="tracker-container">
                
                <div class="header-controls panel">
                    <button onclick="changeDay(-1)">&#9668; PREV DAY</button>
                    <h3 id="current-date-display" style="margin:0; font-size: 1.5em; color: #FFFF00;">Day</h3>
                    <button onclick="changeDay(1)">NEXT DAY &#9658;</button>
                </div>

                <div class="stats-card panel">
                    <h2 id="stats-title">Day</h2>
                    <p>Time Slept: <span id="time-slept" style="color:#00FFFF;">0h 0m</span> &nbsp;||&nbsp; Time Awake: <span id="time-awake" style="color:#FF00FF;">0h 0m</span></p>
                    <p>Time Remaining: <span id="time-remaining">0h 0m</span></p>
                    <div id="current-status-container">
                        <!-- We will inject the marquee here -->
                    </div>
                </div>

                <div class="timeline-container panel">
                    <h3>+++ 24-HOUR TIMELINE +++</h3>
                    <div class="timeline-wrapper">
                        <div class="dynamic-labels" id="dynamic-labels"></div>
                        
                        <div class="timeline-bar" id="timeline-bar"></div>
                        
                        <div class="fixed-labels">
                            <span class="fixed-label" style="left: 0%;">12a</span>
                            <span class="fixed-label" style="left: 25%;">6a</span>
                            <span class="fixed-label" style="left: 50%;">12p</span>
                            <span class="fixed-label" style="left: 75%;">6p</span>
                            <span class="fixed-label" style="left: 100%;">12a</span>
                        </div>
                    </div>
                </div>

                <div class="input-group panel">
                    <div>
                        <label>Enter Time:</label>
                        <input type="time" id="event-time">
                    </div>
                    <button class="btn-sleep" onclick="logEvent('sleep')">LOG SLEEP (ZzZ)</button>
                    <button class="btn-wake" onclick="logEvent('wake')">LOG WAKE (!)</button>
                </div>

                <div class="log-list panel">
                    <h3>~ RAW EVENT LOGS ~</h3>
                    <div id="logs-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. TABS ---
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.querySelectorAll('iframe').forEach(iframe => {
                iframe.setAttribute('src', ''); 
            });

            const activeTab = document.getElementById(tabId);
            activeTab.classList.add('active');
            btnElement.classList.add('active');

            const activeIframe = activeTab.querySelector('iframe');
            if (activeIframe) {
                const urlToLoad = activeIframe.getAttribute('data-src');
                activeIframe.setAttribute('src', urlToLoad);
            }
        }

        // --- 2. EVENT-DRIVEN PUPPY TRACKER ---
        let events = JSON.parse(localStorage.getItem('puppyTrackerEvents')) || [];
        let viewDate = new Date(); 

        function setCurrentTime() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('event-time').value = `${hh}:${mm}`;
        }

        function changeDay(offset) {
            viewDate.setDate(viewDate.getDate() + offset);
            updateTrackerUI();
        }

        function logEvent(type) {
            const timeVal = document.getElementById('event-time').value;
            if (!timeVal) return alert("You gotta enter a time, dude!");
            
            const [hours, minutes] = timeVal.split(':').map(Number);
            const eventDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), viewDate.getDate(), hours, minutes);
            
            events.push({
                id: Date.now(),
                type: type, 
                timestamp: eventDate.getTime()
            });
            
            localStorage.setItem('puppyTrackerEvents', JSON.stringify(events));
            updateTrackerUI();
        }

        function deleteEvent(id) {
            events = events.filter(ev => ev.id !== id);
            localStorage.setItem('puppyTrackerEvents', JSON.stringify(events));
            updateTrackerUI();
        }

        function generateSleepBlocks() {
            const sortedEvents = [...events].sort((a, b) => a.timestamp - b.timestamp);
            let blocks = [];
            let currentSleepStart = null;

            sortedEvents.forEach(ev => {
                if (ev.type === 'sleep') {
                    currentSleepStart = ev.timestamp; 
                } else if (ev.type === 'wake' && currentSleepStart !== null) {
                    blocks.push({ start: currentSleepStart, end: ev.timestamp }); 
                    currentSleepStart = null;
                }
            });

            if (currentSleepStart !== null) {
                blocks.push({ start: currentSleepStart, end: null }); 
            }

            return blocks;
        }

        function updateTrackerUI() {
            const sleepBlocks = generateSleepBlocks();
            const now = new Date().getTime();

            // Status Banner (Using a classic MARQUEE tag)
            const sortedEvents = [...events].sort((a, b) => a.timestamp - b.timestamp);
            const statusContainer = document.getElementById('current-status-container');
            let statusText = "";
            let statusColor = "";
            
            if (sortedEvents.length === 0) {
                statusText = "STATUS: AWAITING INPUT...";
                statusColor = "#FFFF00";
            } else {
                const lastEvent = sortedEvents[sortedEvents.length - 1];
                if (lastEvent.type === 'sleep') {
                    statusText = `*** STATUS: SNOOZING ***`;
                    statusColor = "var(--sleep-color)";
                } else {
                    statusText = `*** STATUS: WOKE ***`;
                    statusColor = "var(--wake-color)";
                }
            }
            
            // Re-inject the marquee every update to keep it fresh
            statusContainer.innerHTML = `<div id="current-status" style="color: ${statusColor};"><marquee scrollamount="8" width="80%">${statusText}</marquee></div>`;

            // Calculations Setup
            const dayStart = new Date(viewDate.getFullYear(), viewDate.getMonth(), viewDate.getDate(), 0, 0, 0).getTime();
            const dayEnd = new Date(viewDate.getFullYear(), viewDate.getMonth(), viewDate.getDate(), 23, 59, 59).getTime();
            const totalMsInDay = dayEnd - dayStart;

            const timelineBar = document.getElementById('timeline-bar');
            const dynamicLabels = document.getElementById('dynamic-labels');
            timelineBar.innerHTML = ''; 
            dynamicLabels.innerHTML = '';

            // Render 24 hour tick marks inside the bar
            for (let i = 0; i <= 24; i++) {
                const tick = document.createElement('div');
                tick.className = 'hour-tick';
                tick.style.left = `${(i / 24) * 100}%`;
                timelineBar.appendChild(tick);
            }

            // Render Dynamic Logged Events (Numbers over the bar)
            sortedEvents.forEach(ev => {
                if (ev.timestamp >= dayStart && ev.timestamp <= dayEnd) {
                    const evDate = new Date(ev.timestamp);
                    let hourNumber = evDate.getHours() % 12;
                    if (hourNumber === 0) hourNumber = 12; 
                    
                    const leftPercentage = ((ev.timestamp - dayStart) / totalMsInDay) * 100;
                    
                    const label = document.createElement('span');
                    label.className = 'dynamic-label';
                    label.style.left = `${leftPercentage}%`;
                    label.innerText = hourNumber;
                    label.style.color = ev.type === 'sleep' ? 'var(--sleep-color)' : 'var(--wake-color)';
                    
                    dynamicLabels.appendChild(label);
                }
            });

            // Render Sleep Blocks
            let dailySleepMs = 0;
            sleepBlocks.forEach(block => {
                const blockStart = block.start;
                const blockEnd = block.end ? block.end : now; 

                const overlapStart = Math.max(blockStart, dayStart);
                const overlapEnd = Math.min(blockEnd, dayEnd);

                if (overlapStart < overlapEnd) {
                    dailySleepMs += (overlapEnd - overlapStart);

                    const leftPercentage = ((overlapStart - dayStart) / totalMsInDay) * 100;
                    const widthPercentage = ((overlapEnd - overlapStart) / totalMsInDay) * 100;

                    const visualBlock = document.createElement('div');
                    visualBlock.className = 'timeline-sleep-block';
                    visualBlock.style.left = `${leftPercentage}%`;
                    visualBlock.style.width = `${widthPercentage}%`;
                    timelineBar.appendChild(visualBlock);
                }
            });

            const sleepHrs = Math.floor(dailySleepMs / (1000 * 60 * 60));
            const sleepMins = Math.floor((dailySleepMs % (1000 * 60 * 60)) / (1000 * 60));

            // AWAKE TIME CALCULATION
            let timeElapsedMs = 0;
            if (dayStart <= now) {
                timeElapsedMs = Math.min(now, dayEnd) - dayStart;
            }
            const awakeMs = Math.max(0, timeElapsedMs - dailySleepMs);
            const awakeHrs = Math.floor(awakeMs / (1000 * 60 * 60));
            const awakeMins = Math.floor((awakeMs % (1000 * 60 * 60)) / (1000 * 60));

            // Time remaining in day
            let timeRemainingMs = 0;
            if (dayEnd > now && dayStart <= now) {
                timeRemainingMs = dayEnd - now; 
            } else if (dayStart > now) {
                timeRemainingMs = 24 * 60 * 60 * 1000; 
            } 

            const remHrs = Math.floor(timeRemainingMs / (1000 * 60 * 60));
            const remMins = Math.floor((timeRemainingMs % (1000 * 60 * 60)) / (1000 * 60));

            // Update UI Text
            const options = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
            document.getElementById('current-date-display').innerText = viewDate.toLocaleDateString('en-US');
            document.getElementById('stats-title').innerText = `:: ${viewDate.toLocaleDateString('en-US', options)} ::`;
            document.getElementById('time-slept').innerText = `${sleepHrs}h ${sleepMins}m`;
            document.getElementById('time-awake').innerText = `${awakeHrs}h ${awakeMins}m`;
            document.getElementById('time-remaining').innerText = `${remHrs}h ${remMins}m`;

            // Render Raw Events list
            const container = document.getElementById('logs-container');
            container.innerHTML = '';
            
            const descendingEvents = [...sortedEvents].reverse(); 
            
            descendingEvents.forEach(ev => {
                const timeStr = new Date(ev.timestamp).toLocaleString([], {month: 'numeric', day: 'numeric', hour: '2-digit', minute:'2-digit'});
                const tagClass = ev.type === 'sleep' ? 'tag-sleep' : 'tag-wake';
                const tagText = ev.type === 'sleep' ? '[-ZzZ-]' : '[!O_O!]';
                
                container.innerHTML += `
                    <div class="log-item">
                        <div>
                            <span class="${tagClass}">${tagText}</span>
                            <span style="color:#FFF;">${timeStr}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteEvent(${ev.id})">TRASH</button>
                    </div>
                `;
            });
        }

        setCurrentTime();
        updateTrackerUI();
        setInterval(updateTrackerUI, 60000);

    </script>
</body>
</html>
